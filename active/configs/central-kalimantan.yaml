# yaml-language-server: $schema=./schema.json
# ──────────────────────────────────────────────────────────────────────────────
# palmdef_risk run configuration template
# Copy this file, fill in all required fields, then run:
#   python run.py --config configs/my_run.yaml
# ──────────────────────────────────────────────────────────────────────────────

run:
  project: wri          # short slug used in run folder name
  area: central-kalimantan            # study area label
  task: baseline              # task label (e.g. baseline, scenario_a)

aoi:
  source: data/user_inputs/central-kalimantan.gpkg  # vector file path OR "xmin,ymin,xmax,ymax" bbox
  buffer: 500                      # buffer in metres applied to AOI before download

# UTM CRS for the study area (auto-detected from AOI centroid if omitted)
# Common values: EPSG:32749 (UTM 49N), EPSG:32750 (UTM 50S), EPSG:32754 (UTM 54S)
crs: null

# Google Earth Engine cloud project ID — required for GEE downloads.
# Replace with your actual project ID (e.g. "ee-myusername").
gee_project: personal-research-462915

cache_dir: cache/   # directory for cached raw downloads (shared across runs)

# ── Forest data ──────────────────────────────────────────────────────────────
forest:
  source: gfc                  # "tmf" (JRC Tropical Moist Forest) or "gfc" (Hansen GFC)
  years: [2001, 2012, 2024]    # [t1, t2, t3]; t2 = reference year, t3 = forecast start
  perc: 30                     # tree-cover threshold % (gfc only; ignored for tmf)

# ── Covariate downloads ───────────────────────────────────────────────────────
variables:
  use_ghsl_towns: true         # true → GHSL built-up surface instead of OSM towns
  ghsl_years: [2012, 2024]              # required when use_ghsl_towns: true, e.g. [2020, 2024]
  osm_timeout: 730              # OSM query timeout in seconds

# ── User-supplied spatial inputs ─────────────────────────────────────────────
user_inputs:
  peatland:
    path: data/user_inputs/peatland.gpkg   # peatland polygon layer (GeoPackage or shapefile)
    type: binary                           # "binary" or "continuous" (depth in metres)
  hgu:
    path: data/user_inputs/hgu.gpkg        # HGU (hydrological geomorphic unit) polygons
  plantation:
    source: user  # "download" (Descals Global Oil Palm 1990-2021, accumulated to forest.years) | "user" (rasters below)
    t2: null  # plantation raster at t2 date (used only when source: user)
    t3: null                                # plantation raster at t3 date (used only when source: user)
    industrial_value: 1                     # industrial plantation class value (matches Descals class 1)
    smallholder_value: 2                    # smallholder plantation class value (matches Descals class 2)
  river:
    source: big   # BIG RBI national topographic rivers (better Kalimantan coverage than OSM)
    path: null

# ── Mill data ─────────────────────────────────────────────────────────────────
mill:
  source: trase    # "trase" (download from Trase) or "user" (supply your own file)
  path: null       # required when source: "user"; path to GeoPackage/shapefile

# ── Processing ────────────────────────────────────────────────────────────────
process:
  gravity:
    sigma_km: 25.0    # Gaussian kernel σ for mill accessibility surface (km)
    radius_km: 80.0   # truncation radius for Gaussian filter (must be > sigma_km)
  sensitivity:
    sigmas_km: [15.0, 25.0, 40.0]   # σ values for bandwidth sensitivity analysis

# ── Modelling ─────────────────────────────────────────────────────────────────
model:
  variants: [A, B, C, D, E]   # A=biophysical, B=+gravity, C=+plantation, D=+both, E=+both+HGU spline
  nsamp: 100000          # number of pixels to sample for model training
  csize: 10             # spatial cell size in km for iCAR neighbourhood
  Vbeta: 100           # prior variance for fixed effects
  burnin: 1000          # MCMC burn-in iterations
  mcmc: 20000            # MCMC sampling iterations after burn-in
  thin: 10               # MCMC thinning interval (keep every n-th sample)
  seed: 42              # random seed for reproducibility

# ── Parallel execution ────────────────────────────────────────────────────────
parallel:
  max_workers: null        # null = auto (governed by cpu_fraction + RAM constraints)
  cpu_fraction: 0.8        # fraction of logical CPUs to use
  ram_per_dist_gb: 2.0     # expected RAM per distance-computation task (GB)
  ram_per_icar_gb: 2.0     # expected RAM per iCAR model fit (GB)
  ram_per_predict_gb: 2.0 # expected RAM per prediction task (GB)

# ── Output options ────────────────────────────────────────────────────────────
output:
  project_future: true     # true → project future forest cover to projection_year
  projection_year: 2025     # target year (must exceed forest.years[-1])
