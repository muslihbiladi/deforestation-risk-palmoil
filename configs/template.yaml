# ──────────────────────────────────────────────────────────────────────────────
# palmoil_risk run configuration template
# Copy this file, fill in all required fields, then run:
#   python run.py --config configs/my_run.yaml
# ──────────────────────────────────────────────────────────────────────────────

run:
  project: myproject          # short slug used in run folder name
  area: kalimantan            # study area label
  task: baseline              # task label (e.g. baseline, scenario_a)

aoi:
  source: data/aoi/study_area.gpkg  # vector file path OR "xmin,ymin,xmax,ymax" bbox
  buffer: 5000                      # buffer in metres applied to AOI before download

crs: "EPSG:32750"   # UTM CRS for the study area; see UTM table in CLAUDE.md

# ── Forest data ──────────────────────────────────────────────────────────────
forest:
  source: tmf         # "tmf" (JRC 2000–2025) or "gfc" (Hansen 2001–2025)
  years: [2015, 2020, 2023]   # [t1, t2, t3]; t2 is reference, t3 is forecast start
  perc: 75            # tree-cover threshold (gfc only; ignored for tmf)

# ── Covariate downloads ───────────────────────────────────────────────────────
variables:
  use_ghsl_towns: false         # true → download GHSL built-up surface instead of OSM towns
  ghsl_years: null              # required when use_ghsl_towns: true, e.g. [2020, 2023]
  osm_timeout: 180              # OSM query timeout in seconds

# ── User-supplied spatial inputs ─────────────────────────────────────────────
user_inputs:
  peatland:
    path: data/user_inputs/peatland.gpkg   # peatland polygon layer (GeoPackage or shapefile)
    type: binary                           # "binary" or "continuous" (depth in metres)
  hgu:
    path: data/user_inputs/hgu.gpkg        # HGU (hydrological geomorphic unit) polygon layer
  plantation:
    t2: data/user_inputs/plantation_t2.tif  # plantation raster at t2 date (reference year)
    t3: null                                # plantation raster at t3 date (optional)
    industrial_value: 1                     # pixel value for industrial plantation class
    smallholder_value: 2                    # pixel value for smallholder plantation class

# ── Mill data ─────────────────────────────────────────────────────────────────
mill:
  source: trase   # "trase" (UML via Trase) or "gfw" (Global Forest Watch)

# ── Processing ────────────────────────────────────────────────────────────────
process:
  kde_bandwidth_km: 35.0  # Gaussian KDE bandwidth for mill density surface (km)
  lq_epsilon: 0.001       # small constant added before LQ ratio to avoid division by zero
  lq_direction: mp        # "mp" = mills/plantation (default); "pm" = plantation/mills

# ── Modelling ─────────────────────────────────────────────────────────────────
model:
  variants: [A, B, E, F]   # subset of A–G to fit; G adds LQ×policy interactions
  csize: 10                 # spatial cell size in km for ICAR neighbourhood
  burnin: 1000              # MCMC burn-in iterations
  mcmc: 1000                # MCMC sampling iterations after burn-in
  thin: 1                   # MCMC thinning interval (keep every n-th sample)
  run_gwr: false            # true → fit GWR on sample data (requires mgwr package)
  gwr_bandwidth: adaptive   # "adaptive" (golden-section search) or a fixed value in metres

# ── Output options ────────────────────────────────────────────────────────────
output:
  project_future: false     # true → project future forest cover to projection_year
  projection_year: 2035     # target year for future projection (must exceed forest.years[-1])
  risk_classes: 5           # number of risk zones in the classified output raster
  scenarios: []             # list of scenario names for multi-scenario runs (optional)
  # scenarios:
  #   - name: no_expansion
  #   - name: high_expansion
